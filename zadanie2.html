<!DOCTYPE html>
<html>
<head>
    <meta align="center" name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        canvas {
            border: 1px solid #d3d3d3;
            background-color: #f1f1f1;
            padding-left: 0;
            padding-right: 0;
            margin-left: auto;
            margin-right: auto;
            display: block;
        }
    </style>
</head>
<body onload="startGame()">
    <script>

        var platform;
        var ball;
        var isGamePaused = false;
        var isGameLost = false;
		var rows = 3;
		var columns = 40;
		var blockCount = rows * columns;
		var blockArr = new Array(blockCount);
		var colorArr = new Array("red", "green", "blue");
		var canvasWidth = 500;
		var canvasHeight = 500;
		var blockWidth = (canvasWidth - 2) / columns - 1;
		var blockHeight = 20;

        function startGame() {
            platform = new defPlatform(100, 50, "magenta", 200, 450);
            ball = new defBall(5, "black", 3);
			var blockCounter = 0;
			for(var i = 1; i < rows * (blockHeight + 1); i += blockHeight + 1){
				for(var j = 1; j < columns * (blockWidth + 1); j += blockWidth + 1){
					blockArr[blockCounter++] = new defBlock(j, i, blockWidth, blockHeight);
				}
			}
            myGameArea.start();
        }

        var myGameArea = {
            canvas: document.createElement("canvas"),
            start: function () {
                this.canvas.width = canvasWidth;
                this.canvas.height = canvasHeight;
                this.context = this.canvas.getContext("2d");
                document.body.insertBefore(this.canvas, document.body.childNodes[0]);
                this.interval = setInterval(updateGameArea, 20);

                window.addEventListener('keydown', function (e) {
                    myGameArea.key = e.keyCode;
                })
                window.addEventListener('keyup', function (e) {
                    myGameArea.key = false;
                })
            },
            clear: function () {
                this.context.clearRect(0, 0, this.canvas.width, this.canvas.height);
            }
        }

        function defPlatform(width, height, color, x, y) {
            this.width = width;
            this.height = height;
            this.speedX = 0;
            this.x = x;
            this.y = y;
            this.update = function () {
                gameContext = myGameArea.context;
                gameContext.fillStyle = color;
                gameContext.fillRect(this.x, this.y, this.width, this.height);
            }
            this.newPos = function () {
                this.x += this.speedX;
            }
        }

        function defBall(radius, color, speed) {
            this.radius = radius;
            this.x = Math.floor(Math.random() * 490) + 10;
            this.y = Math.floor(Math.random() * 200) + 10;
            this.speed = speed;
            if (Math.random() < 0.5) {
                this.isMovingRight = true;
            } else {
                this.isMovingRight = false;
            }
            this.isMovingDown = true;
            this.update = function () {
                gameContext = myGameArea.context;
                gameContext.beginPath();
                gameContext.fillStyle = color;
                gameContext.arc(this.x, this.y, this.radius, 0, 2 * Math.PI);
                gameContext.fill();
                gameContext.closePath();
            }
            this.newPos = function () {
                gameContext = myGameArea.context

                if (this.isMovingRight) {
                    if (this.x + this.radius > gameContext.canvas.width) {
                        this.isMovingRight = false;
                    }
                    this.x += this.speed;
                } else {
                    if (this.x < 0 + this.radius) {
                        this.isMovingRight = true;
                    }
                    this.x -= this.speed;
                }

                if (this.isMovingDown) {
                    this.y += this.speed;
                } else {
                    if (this.y - this.radius <= 0) {
                        this.isMovingDown = true;
                    }
                    this.y -= this.speed;
                }
            }
        }
		
		function defBlock(x, y, width, height){
			var color = colorArr[Math.floor(Math.random() * 3)];
            this.width = width;
            this.height = height;
            this.update = function () {
                gameContext = myGameArea.context;
                gameContext.fillStyle = color;
                gameContext.fillRect(this.x, this.y, this.width, this.height);
            }
			this.newPos = function(){
				this.x = x;
				this.y = y;
			}
		}

        function updateGameArea() {
            if (!isGamePaused) {
                if (isGameLost) {
                    isGamePaused = true;
                    isGameLost = false;
                    clearInterval(myGameArea.interval);
                    startGame();
                }
                myGameArea.clear();
                platform.newPos();
                ball.newPos();
                stopPlatform();
                if (myGameArea && myGameArea.key == 37) {
                    moveLeft();
                }
                if (myGameArea && myGameArea.key == 39) {
                    moveRight();
                }
				
                platform.update();
                ball.update();
				for(var i = 0; i < blockArr.length; i++){
					blockArr[i].newPos();
					blockArr[i].update();
					//popBlock(ball, blockArr[i]);
				}
                checkCollision(ball, platform);
                if (ball.y + ball.radius >= gameContext.canvas.height) {
                    isGameLost = true;
                }
            }
        }
		
		function checkCollision(ball, rectangle){
			if ((ball.y - ball.radius >= rectangle.y) && ((ball.x - ball.radius >= rectangle.x) && (ball.x + ball.radius <= rectangle.x + rectangle.width)) && ball.isMovingDown){
				    ball.isMovingDown = !ball.isMovingDown;
					return true;
			}else if (((ball.x + ball.radius >= rectangle.x) && (ball.x - ball.radius <= rectangle.x + rectangle.width)) && (ball.y + ball.radius > rectangle.y)){
					ball.isMovingRight = !ball.isMovingRight;
					return true;
			}else{
				return false;
			}
		}
		
		function popBlock(ball, block){
			if(checkCollision(ball, block)){
				block.x = -100;
				block.y = -100;
			}
		}
		
        function moveLeft() {
            if (platform.x > 0) {
                platform.speedX = -4;
            }
        }

        function moveRight() {
            if (platform.x < myGameArea.canvas.width - platform.width) {
                platform.speedX = 4;
            }
        }

        function stopPlatform() {
            platform.speedX = 0;
        }

        function pause() {
            if (!isGamePaused) {
               isGamePaused = true;
            }
        }

        function start() {
            if (isGamePaused) {
                isGamePaused = false;
            }
        }

    </script>
    <div style="text-align:center;width:auto;">
        <button style="width:100px" onclick="moveLeft()">LEFT</button>
        <button style="width:100px" onclick="moveRight()">RIGHT</button>
    </div>
    <div style="text-align:center;width:auto;">
        <button style="width:100px" onclick="start()">START</button>
        <button style="width:100px" onclick="pause()">STOP</button>
    </div>
</body>
</html>
