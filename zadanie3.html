<!DOCTYPE html>
<html lang="en">
<head>
    <title>Arkanoid</title>
    <meta name="viewport" content="user-scalable=no initial-scale=1.0" />
    <style>
        html {
            overflow: hidden;
        }

        body {
            overflow: hidden;
            position: relative;
            margin: 0;
            padding: 0;
        }
        canvas {
            border: 1px solid #d3d3d3;
            background-color: #f1f1f1;
            padding-left: 0;
            padding-right: 0;
            margin-left: auto;
            margin-right: auto;
            display: block;
        }
    </style>
</head>
<body onload="startGame()">
    <script src="game.js"></script>
<!--    <script src="db.js"></script>-->
    <div style="text-align:center;">
        Score: <span id="score">0</span>
    </div>
    <div style="text-align:center;">
        Timer: <span id="timer">0</span>
    </div>
    <!--<div style="text-align:center;width:auto;">
        <button style="width:100px" onclick="moveLeft()">LEFT</button>
        <button style="width:100px" onclick="moveRight()">RIGHT</button>
    </div>-->
    <div style="text-align:center;width:auto;">
        <button style="height:25%" onclick="start()">START</button>
        <button style="height:25%" onclick="pause()">STOP</button>
    </div>
</body>
</html>
