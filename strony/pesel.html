<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="/css/style_pesel.css">
    <script src="/scripts/pesel.js"></script>
</head>

<body>
    <header>
    </header>
    <section>
        <container>
            <h1>PESEL WEBWORKERS</h1>
            <div class="t_inputs">
                <label for="year">Year:</label>
                <input type="text" id="year" name="year" min="1800" max="2299">
                
                <label for="month">Month:</label>
                <input type="text" id="month" name="month" minlength="2" maxlength="2">

                <label for="day">Day:</label>
                <input type="text" id="day" name="day" minlength="2" maxlength="2">

                <label for="last">Last 5 digits:</label>
                <input type="text" id="last" name="last" minlength="5" maxlength="5">
            </div>
            <div class="buttons">
                <div>
                    <button onclick="validate()" class="button" id="validateButton" type="submit">VALIDATE</button>
                </div>
                <div>
                    <button onclick="find()" class="button" id="findButton" type="submit">FIND</button>
                </div>
                <div>
                    <button onclick="show()" class="button" id="showButton" type="submit">SHOW</button>
                </div>
            </div>
            <div>
               <span id="valid">not valid</span> 
            </div>

            <div id="toCalc">
                
            </div>
        </container>
    </section>
    <footer>
    </footer>
</body>

</html>
