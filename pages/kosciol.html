<!DOCTYPE html>
<html lang="PL">

<head>
    <title>SPU Studio</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pagePiling.js/1.5.6/jquery.pagepiling.min.css" integrity="sha512-W9OWS8dgpQBw5Hb+tbMto1BMsHvYOXT/AFBGvASCPUJleaEdpOAN5lzgj9RrTbo3YrlR+m9xdOBccp8F+SFyQg==" crossorigin="anonymous" referrerpolicy="no-referrer"
    />
    <script src="js/auto-slider.js"></script>
</head>

<body style="background-color: black;">
    <ul id="menu" style="margin-left: 30vw;">
        <li class="active"><a href="/">Powrót na stronę główną</a></li>
        <li class="active"><a href="https://marientall.pl/mesh/2021/Kosciol/App/index.html#%2F" target="_blank">Zobacz pełny model</a></li>
    </ul>
    <div class="fh-carousel">
        <div class="carousel slide" data-ride="carousel" style="height: 100%; overflow: hidden">
            <div style="
                        height: 100%;
                        display: block;
                        margin: auto;
                        background-color: black;
                    " id="carouselIndicators" class="carousel slide carousel-fade" data-bs-ride="carousel" data-interval="50000">
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#carouselIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                    <button type="button" data-bs-target="#carouselIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
                    <button type="button" data-bs-target="#carouselIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
                    <button type="button" data-bs-target="#carouselIndicators" data-bs-slide-to="3" aria-label="Slide 4"></button>
                    <button type="button" data-bs-target="#carouselIndicators" data-bs-slide-to="4" aria-label="Slide 5"></button>
                    <button type="button" data-bs-target="#carouselIndicators" data-bs-slide-to="5" aria-label="Slide 6"></button>
                </div>
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img class="img" alt="Responsive image" src="../img/P1.PNG" />
                    </div>
                    <div class="carousel-item">
                        <img class="img" alt="Responsive image" src="../img/P2.PNG" />
                    </div>
                    <div class="carousel-item">
                        <img class="img" alt="Responsive image" src="../img/P3.PNG" />
                    </div>
                    <div class="carousel-item">
                        <img class="img" alt="Responsive image" src="../img/P4.PNG" />
                    </div>
                    <div class="carousel-item">
                        <img class="img" alt="Responsive image" src="../img/P5.PNG" />
                    </div>
                    <div class="carousel-item">
                        <img class="img" alt="Responsive image" src="../img/P6.PNG" />
                    </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselIndicators" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselIndicators" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pagePiling.js/1.5.6/jquery.pagepiling.min.js" integrity="sha512-FcXc9c211aHVJEHxoj2fNFeT8+wUESf/4mUDIR7c31ccLF3Y6m+n+Wsoq4dp2sCnEEDVmjhuXX6TfYNJO6AG6A==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</body>

</html>
